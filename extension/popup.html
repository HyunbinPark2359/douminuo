<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트누오 샘플 변환기 · 환경설정</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="popup-head">
      <h1 class="popup-title">환경설정</h1>
    </div>

    <section id="panelSettings" role="region" aria-label="환경설정">
      <section class="options-section" aria-labelledby="theme-heading">
        <h3 id="theme-heading" class="options-heading">팝업 테마</h3>
        <p class="sub options-desc">툴바 아이콘을 눌렀을 때 열리는 팝업 창의 테마입니다.</p>
        <label class="sr-only" for="themeSelect">팝업 테마 선택</label>
        <select id="themeSelect" class="options-theme-select" aria-labelledby="theme-heading">
          <option value="light">라이트</option>
          <option value="dark">다크</option>
          <option value="system">시스템 (자동)</option>
        </select>
      </section>

      <section class="options-section" aria-labelledby="floating-heading">
        <h3 id="floating-heading" class="options-heading">플로팅 버튼</h3>
        <p class="sub options-desc">계산기·팀빌더 페이지에 편의 기능용 플로팅 버튼을 표시합니다.</p>
        <div class="settings-options-row" role="group" aria-label="플로팅 표시 대상">
          <label class="settings-option-row" for="showCalcFloating">
            <input type="checkbox" id="showCalcFloating" />
            <span>계산기</span>
          </label>
          <label class="settings-option-row" for="showTeamBuilderFloating">
            <input type="checkbox" id="showTeamBuilderFloating" />
            <span>팀빌더</span>
          </label>
        </div>
      </section>

      <section class="options-section" aria-labelledby="tb-inline-heading">
        <h3 id="tb-inline-heading" class="options-heading">팀빌더 결정력·내구력</h3>
        <p class="sub options-desc">팀빌더 좌측 샘플 목록에 결정력과 내구력을 표시합니다.</p>
        <div class="settings-options-row" role="group" aria-label="팀빌더 인라인 표시">
          <label class="settings-option-row" for="tbInlineMovePower">
            <input type="checkbox" id="tbInlineMovePower" />
            <span>결정력</span>
          </label>
          <label class="settings-option-row" for="tbInlineBulk">
            <input type="checkbox" id="tbInlineBulk" />
            <span>내구력</span>
          </label>
        </div>
      </section>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
