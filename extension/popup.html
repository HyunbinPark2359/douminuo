<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도우미누오 · 환경설정</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="popup-head">
      <h1 class="popup-title">환경설정</h1>
    </div>

    <section id="panelSettings" role="region" aria-label="환경설정">
      <section class="options-section options-section--theme" aria-labelledby="theme-heading">
        <h3 id="theme-heading" class="options-heading">팝업 테마</h3>
        <div class="theme-row">
          <p class="sub options-desc theme-row-desc">팝업 창의 테마입니다.</p>
          <label class="sr-only" for="themeSelect">팝업 테마 선택</label>
          <select id="themeSelect" class="options-theme-select" aria-labelledby="theme-heading">
            <option value="light">라이트</option>
            <option value="dark">다크</option>
            <option value="system">시스템 (자동)</option>
          </select>
        </div>
      </section>

      <section class="options-section" aria-labelledby="floating-heading">
        <h3 id="floating-heading" class="options-heading">플로팅 버튼</h3>
        <p class="sub options-desc">계산기·팀빌더 페이지에 편의 기능용 플로팅 버튼을 표시합니다.</p>
        <div class="settings-options-row" role="group" aria-label="플로팅 표시 대상">
          <label class="settings-option-row" for="showCalcFloating">
            <input type="checkbox" id="showCalcFloating" />
            <span>계산기</span>
          </label>
          <label class="settings-option-row" for="showTeamBuilderFloating">
            <input type="checkbox" id="showTeamBuilderFloating" />
            <span>팀빌더</span>
          </label>
        </div>
      </section>

      <section class="options-section" aria-labelledby="tb-inline-heading">
        <h3 id="tb-inline-heading" class="options-heading">팀빌더 결정력·내구력</h3>
        <p class="sub options-desc">팀빌더 좌측 샘플 목록에 결정력과 내구력을 표시합니다.</p>
        <div class="settings-options-row" role="group" aria-label="팀빌더 인라인 표시">
          <label class="settings-option-row" for="tbInlineMovePower">
            <input type="checkbox" id="tbInlineMovePower" />
            <span>결정력</span>
          </label>
          <label class="settings-option-row" for="tbInlineBulk">
            <input type="checkbox" id="tbInlineBulk" />
            <span>내구력</span>
          </label>
        </div>
      </section>

      <section class="options-section" aria-labelledby="simple-speed-heading">
        <div class="settings-heading-row">
          <h3 id="simple-speed-heading" class="options-heading">간단 스피드 계산기</h3>
          <label class="toggle-switch" title="기능 켜기/끄기">
            <input type="checkbox" id="simpleSpeedCalcEnabled" aria-labelledby="simple-speed-heading" />
            <span class="toggle-switch-track" aria-hidden="true"></span>
          </label>
        </div>
        <p class="sub options-desc">
          팀빌더 스피드 실수치 옆에 추월 가능한 종족값을 보여 줍니다.
        </p>
        <div id="speedTableOptions" class="speed-table-options">
          <div class="speed-table-row" role="group" aria-label="스피드표">
            <label class="settings-option-row speed-table-check" for="speedTableShow">
              <input type="checkbox" id="speedTableShow" />
              <span>스피드표 표시</span>
            </label>
            <div class="speed-table-trigger-radios" id="speedTableTriggerGroup">
              <label class="settings-option-row speed-trigger-radio" for="speedTableTriggerHover">
                <input type="radio" name="speedTableTrigger" id="speedTableTriggerHover" value="hover" />
                <span>호버</span>
              </label>
              <label class="settings-option-row speed-trigger-radio" for="speedTableTriggerClick">
                <input type="radio" name="speedTableTrigger" id="speedTableTriggerClick" value="click" />
                <span>클릭</span>
              </label>
            </div>
          </div>
        </div>
      </section>
    </section>

    <footer class="popup-foot">
      <a class="popup-foot__link"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfA97NKxUqModwfLulTKqiBrSmnYvwPUEaMXa1__-lP5orG1Q/viewform?usp=header"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="문의·제보 폼을 새 탭에서 엽니다">
        <svg class="popup-foot__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M16.881 4.346A23.112 23.112 0 0 1 8.25 6H7.5a5.25 5.25 0 0 0-.88 10.428 21.74 21.74 0 0 0 1.728 4.93c.42.838 1.41 1.21 2.32.94l.78-.236c.94-.281 1.456-1.282 1.151-2.214a17.836 17.836 0 0 0-1.1-2.69 23.115 23.115 0 0 1 5.382 1.345 23.247 23.247 0 0 0 0-14.157Z M19.5 6a3 3 0 0 1 0 6V6Z"/>
        </svg>
        <span class="popup-foot__text">문의·제보</span>
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
