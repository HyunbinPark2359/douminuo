<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트누오 샘플 포맷터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-10">
    <header class="mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-slate-800">스마트누오 샘플 포맷터</h1>
      <p class="mt-1 text-sm text-slate-500">복사한 샘플 텍스트를 붙여 넣으면 보기 편한 한 줄 요약 형식으로 바꿉니다.</p>
    </header>

    <div class="grid gap-6 lg:grid-cols-2">
      <section class="flex flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <label for="input" class="mb-2 text-sm font-semibold text-slate-700">입력</label>
        <textarea
          id="input"
          rows="16"
          class="min-h-[280px] w-full flex-1 resize-y rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-3 font-mono text-sm leading-relaxed text-slate-800 placeholder:text-slate-400 focus:border-indigo-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-100"
          placeholder="샘플 텍스트를 붙여 넣으세요…"
        ></textarea>
      </section>

      <section class="flex flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="mb-2 flex items-center justify-between gap-2">
          <label for="output" class="text-sm font-semibold text-slate-700">출력</label>
          <button
            type="button"
            id="copyBtn"
            class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white shadow-sm transition hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2"
          >
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            복사하기
          </button>
        </div>
        <textarea
          id="output"
          readonly
          rows="16"
          class="min-h-[280px] w-full flex-1 resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 font-mono text-sm leading-relaxed text-slate-800 focus:outline-none"
        ></textarea>
        <p id="copyToast" class="mt-2 hidden text-center text-xs font-medium text-emerald-600">클립보드에 복사했습니다.</p>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const STAT_MAP = [
        { keys: ['HP', 'hp'], letter: 'H' },
        { keys: ['공격'], letter: 'A' },
        { keys: ['방어'], letter: 'B' },
        { keys: ['특수공격', '특공'], letter: 'C' },
        { keys: ['특수방어', '특방'], letter: 'D' },
        { keys: ['스피드', '스핏'], letter: 'S' },
      ];

      function trimOrDash(s) {
        const t = (s || '').trim();
        return t ? t : '--';
      }

      function parseKeyValueLine(line) {
        const m = line.match(/^(.+?)\s*:\s*(.*)$/);
        if (!m) return null;
        return { key: m[1].trim(), value: m[2].trim() };
      }

      function parseEvFromValue(value) {
        const nums = value.match(/\d+/g);
        if (!nums || nums.length < 2) return null;
        return parseInt(nums[1], 10);
      }

      function statLetterForKey(key) {
        for (const row of STAT_MAP) {
          if (row.keys.some((k) => key === k || key.startsWith(k + ' '))) return row.letter;
        }
        return null;
      }

      function isNameLine(line, parsedLines) {
        if (!line || line.includes(':')) return false;
        const kv = parseKeyValueLine(line);
        if (kv) return false;
        const lower = line.trim();
        if (/^기술\s*\d/.test(lower)) return false;
        return true;
      }

      function extractNameFromTitle(title) {
        const pipe = title.indexOf('|');
        if (pipe === -1) return '';
        return title.slice(pipe + 1).trim();
      }

      function formatSample(raw) {
        const lines = raw.split(/\r?\n/).map((l) => l.trimEnd());
        if (!lines.length || !lines[0].trim()) {
          return '';
        }

        const title = lines[0].trim();
        let name = '';
        const ability = { raw: '' };
        const item = { raw: '' };
        const nature = { raw: '' };
        const moves = ['', '', '', ''];

        let i = 1;
        if (i < lines.length && lines[i].trim()) {
          const candidate = lines[i].trim();
          if (isNameLine(candidate, null) && !parseKeyValueLine(candidate)) {
            name = candidate;
            i++;
          }
        }

        for (; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const kv = parseKeyValueLine(line);
          if (!kv) continue;

          const key = kv.key.replace(/\s+/g, ' ').trim();
          const val = kv.value;

          if (key === '특성') {
            ability.raw = val;
            continue;
          }
          if (key === '도구') {
            item.raw = val;
            continue;
          }
          if (key === '성격') {
            nature.raw = val;
            continue;
          }

          const moveMatch = key.match(/^기술\s*(\d)\s*$/);
          if (moveMatch) {
            const idx = parseInt(moveMatch[1], 10) - 1;
            if (idx >= 0 && idx < 4) moves[idx] = val;
            continue;
          }

          const letter = statLetterForKey(key);
          if (letter) {
            const ev = parseEvFromValue(val);
            if (letter && ev !== null) {
              if (!formatSample._evs) formatSample._evs = {};
            }
          }
        }

        const evParts = [];
        for (let j = 1; j < lines.length; j++) {
          const line = lines[j].trim();
          if (!line) continue;
          const kv = parseKeyValueLine(line);
          if (!kv) continue;
          const key = kv.key.replace(/\s+/g, ' ').trim();
          const letter = statLetterForKey(key);
          if (!letter) continue;
          const ev = parseEvFromValue(kv.value);
          if (ev === null) continue;
          if (ev !== 0) evParts.push({ letter, ev });
        }

        if (!name) name = extractNameFromTitle(title);

        const evLine = evParts.map((p) => p.letter + p.ev).join(' ');
        const moveLine = moves.map((m) => trimOrDash(m)).join(' / ');

        const out = [
          title,
          trimOrDash(name) + ' @' + trimOrDash(item.raw),
          trimOrDash(nature.raw) + ' / ' + trimOrDash(ability.raw),
          evLine,
          moveLine,
        ];

        return out.join('\n');
      }

      // remove mistaken property from formatSample
      formatSample._evs = undefined;

      const inputEl = document.getElementById('input');
      const outputEl = document.getElementById('output');
      const copyBtn = document.getElementById('copyBtn');
      const toast = document.getElementById('copyToast');

      function updateOutput() {
        outputEl.value = formatSample(inputEl.value);
      }

      let toastTimer;
      function showToast() {
        toast.classList.remove('hidden');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.add('hidden');
        }, 2000);
      }

      inputEl.addEventListener('input', updateOutput);

      copyBtn.addEventListener('click', async function () {
        const text = outputEl.value;
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          showToast();
        } catch (e) {
          outputEl.select();
          document.execCommand('copy');
          showToast();
        }
      });

      const demo =
        '#2 | 룸깔이 따라큐\n' +
        '따라큐\n' +
        '특성 : 탈\n' +
        '도구 : 반짝가루\n' +
        '성격 : 용감\n' +
        'HP : 162 32\n' +
        '공격 : 143 20\n' +
        '방어 : 113 13\n' +
        '특수공격 : 70 0\n' +
        '특수방어 : 126 1\n' +
        '스피드 : 104 0\n' +
        '기술 1 : 치근거리기\n' +
        '기술 2 : 야습\n' +
        '기술 3 : 저주\n' +
        '기술 4 : 트릭룸';

      inputEl.value = demo;
      updateOutput();
    })();
  </script>
</body>
</html>
